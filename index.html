<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleep Cycle Pro | 最速計算</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --accent: #22c55e;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: all 0.3s ease;
        }

        .container {
            width: 90%;
            max-width: 400px;
            background: var(--card);
            padding: 2rem;
            border-radius: 24px;
            box-shadow: var(--shadow);
            position: relative;
        }

        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            cursor: pointer;
            font-size: 1.2rem;
            background: var(--bg);
            padding: 5px 10px;
            border-radius: 12px;
        }

        h2 { text-align: center; margin-top: 0; }

        .input-group { margin-bottom: 1.2rem; }
        label { display: block; font-size: 0.8rem; font-weight: bold; margin-bottom: 5px; color: var(--text-muted); }

        select, input {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 2px solid var(--bg);
            background: var(--bg);
            color: var(--text);
            font-size: 1rem;
            box-sizing: border-box;
        }

        .button-stack { display: grid; gap: 10px; margin-top: 1rem; }

        .btn {
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: var(--text-muted); color: white; opacity: 0.8; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }

        .results-area { margin-top: 1.5rem; }
        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            margin-bottom: 8px;
            background: var(--bg);
            border-radius: 12px;
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .time-tag { font-size: 1.2rem; font-weight: 800; color: var(--primary); }
        .info-tag { font-size: 0.75rem; text-align: right; }
        .recommend { border: 2px solid var(--accent); position: relative; }
        .recommend::after {
            content: "BEST";
            position: absolute;
            top: -10px;
            right: 10px;
            background: var(--accent);
            color: white;
            font-size: 0.6rem;
            padding: 2px 6px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="theme-toggle" id="themeBtn">🌙</div>
    <h2>Sleep Pro</h2>

    <div class="input-group">
        <label>モード選択</label>
        <select id="mode">
            <option value="bedtime">指定した時間に寝る</option>
            <option value="waketime">指定した時間に起きる</option>
        </select>
    </div>

    <div class="input-group">
        <label>基準時刻</label>
        <input type="time" id="timeInput">
    </div>

    <div class="button-stack">
        <button class="btn btn-primary" onclick="calculate(false)">計算する</button>
        <button class="btn btn-secondary" onclick="calculate(true)">今すぐ寝る（現在時刻で計算）</button>
    </div>

    <div id="results" class="results-area"></div>
</div>

<script>
    // ダークモード制御
    const themeBtn = document.getElementById('themeBtn');
    const body = document.body;
    
    themeBtn.onclick = () => {
        body.dataset.theme = body.dataset.theme === "dark" ? "" : "dark";
        themeBtn.textContent = body.dataset.theme === "dark" ? "☀️" : "🌙";
    };

    // 初期時刻設定
    window.onload = () => {
        const now = new Date();
        document.getElementById("timeInput").value = now.toTimeString().slice(0,5);
    };

    function calculate(isNow) {
        const mode = document.getElementById("mode").value;
        let baseTime = new Date();
        
        if (!isNow) {
            const [h, m] = document.getElementById("timeInput").value.split(":");
            baseTime.setHours(h, m, 0, 0);
        }

        const resultsDiv = document.getElementById("results");
        resultsDiv.innerHTML = `<label style="margin-bottom:10px; display:block;">${mode === 'bedtime' ? '起きるべき時間（近い順）' : '寝るべき時間（近い順）'}</label>`;

        const cycleMs = 90 * 60 * 1000;
        const latencyMs = 15 * 60 * 1000; // 入眠15分
        let times = [];

        for (let i = 1; i <= 8; i++) {
            let target;
            if (mode === "bedtime") {
                target = new Date(baseTime.getTime() + (cycleMs * i) + latencyMs);
            } else {
                target = new Date(baseTime.getTime() - (cycleMs * i) - latencyMs);
            }
            times.push({ date: target, cycles: i });
        }

        // 起床・就寝時刻が「現在から見て未来」に近い順にソート（就寝モードの場合）
        // ※「今から一番近いチャンス」を見つけやすくする
        if (mode === "bedtime") {
            times.sort((a, b) => a.date - b.date);
        } else {
            // 起床指定の場合は、遅い時間（＝今から一番近い寝るべき時間）を上に
            times.sort((a, b) => b.date - a.date);
        }

        times.forEach(item => {
            const tStr = item.date.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
            const duration = (item.cycles * 1.5).toFixed(1);
            const isRecommend = item.cycles === 5 || item.cycles === 6;

            const div = document.createElement("div");
            div.className = `result-item ${isRecommend ? 'recommend' : ''}`;
            div.innerHTML = `
                <div class="time-tag">${tStr}</div>
                <div class="info-tag">
                    <div>${item.cycles} サイクル</div>
                    <div style="color:var(--text-muted)">${duration}h 睡眠</div>
                </div>
            `;
            resultsDiv.appendChild(div);
        });
    }
</script>

</body>
</html>
