<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleep Pro JST | 睡眠サイクル計算機</title>
    <style>
        :root {
            --primary: #4f46e5;
            --bg: #f1f5f9;
            --card: #ffffff;
            --text: #0f172a;
            --accent: #10b981;
            --danger: #ef4444;
        }

        [data-theme="dark"] {
            --bg: #020617;
            --card: #1e293b;
            --text: #f8fafc;
        }

        body {
            font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: 0.3s;
        }

        .container {
            width: 92%;
            max-width: 400px;
            background: var(--card);
            padding: 24px;
            border-radius: 28px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        .header { text-align: center; margin-bottom: 20px; }
        .jst-badge { 
            display: inline-block; 
            background: var(--primary); 
            color: white; 
            padding: 2px 8px; 
            border-radius: 6px; 
            font-size: 0.7rem; 
            font-weight: bold;
            margin-bottom: 8px;
        }

        .theme-toggle {
            position: absolute; top: 20px; right: 20px;
            cursor: pointer; font-size: 1.2rem;
        }

        .input-group { margin-bottom: 16px; }
        label { display: block; font-size: 0.85rem; margin-bottom: 6px; font-weight: 600; opacity: 0.8; }

        select, input {
            width: 100%; padding: 14px; border-radius: 14px;
            border: 2px solid var(--bg); background: var(--bg);
            color: var(--text); font-size: 1rem; box-sizing: border-box;
            outline: none;
        }

        .btn-group { display: grid; gap: 10px; margin-top: 20px; }
        .btn {
            padding: 16px; border: none; border-radius: 14px;
            font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .btn-main { background: var(--primary); color: white; }
        .btn-now { background: var(--text); color: var(--card); }

        .results { margin-top: 24px; }
        .card-result {
            background: var(--bg); padding: 16px; border-radius: 16px;
            margin-bottom: 10px; display: flex; justify-content: space-between;
            align-items: center; border: 2px solid transparent;
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } }

        .card-result.best { border-color: var(--accent); background: rgba(16, 185, 129, 0.05); }
        .res-time { font-size: 1.4rem; font-weight: 900; }
        .res-meta { font-size: 0.8rem; text-align: right; opacity: 0.7; }
        .next-tag { color: var(--danger); font-size: 0.7rem; font-weight: bold; display: block; }
    </style>
</head>
<body>

<div class="container">
    <div class="theme-toggle" id="themeBtn">🌙</div>
    <div class="header">
        <span class="jst-badge">JST 日本標準時モード</span>
        <h2 style="margin:0;">睡眠サイクル</h2>
    </div>

    <div class="input-group">
        <label>今の時刻（日本時間）</label>
        <div id="currentTime" style="font-size: 1.1rem; font-weight: bold; margin-bottom: 10px;">--:--:--</div>
    </div>

    <div class="input-group">
        <label>モード</label>
        <select id="mode">
            <option value="bed">今から寝て、いつ起きる？</option>
            <option value="wake">この時間に起きるには？</option>
        </select>
    </div>

    <div class="input-group" id="targetTimeInput" style="display:none;">
        <label>目標の起床時刻</label>
        <input type="time" id="wakeInput" value="07:00">
    </div>

    <div class="btn-group">
        <button class="btn btn-now" id="calcNow">今すぐ寝る場合の計算</button>
        <button class="btn btn-main" id="calcTarget">目標時刻で計算</button>
    </div>

    <div id="results" class="results"></div>
</div>

<script>
    // --- 日本時間取得ヘルパー ---
    function getJSTDate() {
        const now = new Date();
        // 実行環境によらず日本時間のDateオブジェクトを生成
        const jstString = now.toLocaleString("en-US", {timeZone: "Asia/Tokyo"});
        return new Date(jstString);
    }

    // --- 時計更新 ---
    function updateClock() {
        const now = getJSTDate();
        document.getElementById('currentTime').textContent = now.toLocaleTimeString('ja-JP');
    }
    setInterval(updateClock, 1000);
    updateClock();

    // --- UI制御 ---
    const modeSelect = document.getElementById('mode');
    const targetInputDiv = document.getElementById('targetTimeInput');
    modeSelect.onchange = () => {
        targetInputDiv.style.display = modeSelect.value === 'wake' ? 'block' : 'none';
    };

    const themeBtn = document.getElementById('themeBtn');
    themeBtn.onclick = () => {
        document.body.dataset.theme = document.body.dataset.theme === 'dark' ? '' : 'dark';
        themeBtn.textContent = document.body.dataset.theme === 'dark' ? '☀️' : '🌙';
    };

    // --- 計算メイン ---
    function runCalc(isNow) {
        const mode = modeSelect.value;
        const resultsArea = document.getElementById('results');
        resultsArea.innerHTML = '';

        let baseDate = getJSTDate();
        if (!isNow && mode === 'wake') {
            const [h, m] = document.getElementById('wakeInput').value.split(':');
            baseDate.setHours(h, m, 0, 0);
            // もし設定時間が今より前なら翌日とする
            if (baseDate < getJSTDate()) baseDate.setDate(baseDate.getDate() + 1);
        }

        const cycle = 90 * 60 * 1000;
        const latency = 15 * 60 * 1000; // 入眠バッファ

        let options = [];
        for (let i = 1; i <= 7; i++) {
            let target;
            if (mode === 'bed' || isNow) {
                target = new Date(baseDate.getTime() + (cycle * i) + latency);
            } else {
                target = new Date(baseDate.getTime() - (cycle * i) - latency);
            }
            options.push({ date: target, cycles: i });
        }

        // 現在時刻から見て「未来」に近い順にソート
        const now = getJSTDate();
        if (mode === 'bed' || isNow) {
            options = options.filter(o => o.date > now).sort((a, b) => a.date - b.date);
        } else {
            // 起床時間を決めている場合、直近の「寝るべき時間」を出すため降順
            options.sort((a, b) => b.date - a.date);
        }

        options.forEach((opt, idx) => {
            const isBest = opt.cycles === 5 || opt.cycles === 6;
            const timeStr = opt.date.toLocaleTimeString('ja-JP', {hour: '2-digit', minute:'2-digit'});
            
            const card = document.createElement('div');
            card.className = `card-result ${isBest ? 'best' : ''}`;
            card.innerHTML = `
                <div>
                    ${idx === 0 ? '<span class="next-tag">最速のタイミング</span>' : ''}
                    <div class="res-time">${timeStr}</div>
                </div>
                <div class="res-meta">
                    <div>${opt.cycles} サイクル</div>
                    <div>${(opt.cycles * 1.5).toFixed(1)}h 睡眠</div>
                </div>
            `;
            resultsArea.appendChild(card);
        });
    }

    document.getElementById('calcNow').onclick = () => runCalc(true);
    document.getElementById('calcTarget').onclick = () => runCalc(false);

</script>
</body>
</html>
