<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>睡眠サイクル計算機</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --accent: #22c55e;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }

        [data-theme="dark"] {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: background-color 0.3s ease;
        }

        .container {
            width: 90%;
            max-width: 450px;
            background: var(--card);
            padding: 2rem;
            border-radius: 24px;
            box-shadow: var(--shadow);
            position: relative;
            text-align: center;
        }

        h2 { margin-bottom: 0.5rem; font-weight: 800; }
        .version { font-size: 0.7rem; color: var(--text-muted); margin-bottom: 1.5rem; }

        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
        }

        select, input {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 2px solid transparent;
            background: var(--bg);
            color: var(--text);
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn-calc {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }

        .btn-calc:active { transform: scale(0.98); }

        .results-area {
            margin-top: 2rem;
            display: grid;
            gap: 10px;
        }

        .result-card {
            background: var(--bg);
            padding: 12px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid transparent;
        }

        .result-card.best {
            border-color: var(--accent);
            background: rgba(34, 197, 94, 0.1);
        }

        .time-val { font-size: 1.2rem; font-weight: bold; }
        .duration-val { font-size: 0.8rem; color: var(--text-muted); }

        /* Dark Mode Toggle */
        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            cursor: pointer;
            font-size: 1.5rem;
        }

        .footer-links {
            margin-top: 1.5rem;
            font-size: 0.8rem;
        }
        .footer-links a { color: var(--primary); text-decoration: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="theme-toggle" id="themeBtn">🌙</div>
    
    <h2>Sleep Cycle Pro</h2>
    <div class="version">Next Gen Edition</div>

    <div class="input-group">
        <label>目的を選択</label>
        <select id="mode">
            <option value="bedtime">今から寝て、いつ起きる？</option>
            <option value="waketime">この時間に起きるには、いつ寝る？</option>
        </select>
    </div>

    <div class="input-group">
        <label id="timeLabel">基準となる時間</label>
        <input type="time" id="timeInput">
    </div>

    <div class="input-group">
        <label>入眠までの時間（リラックス時間）</label>
        <select id="latency">
            <option value="0">0分（即入眠）</option>
            <option value="15" selected>15分（標準）</option>
            <option value="30">30分（なかなか寝付けない）</option>
        </select>
    </div>

    <button class="btn-calc" onclick="calculate()">計算して最適化</button>

    <div class="results-area" id="results">
        </div>

    <div class="footer-links">
        <a href="mailto:sk0528jp@gmail.com">フィードバックを送信</a>
    </div>
</div>

<script>
    const themeBtn = document.getElementById('themeBtn');
    const body = document.body;

    // 初期化: 現在時刻セット & ダークモード判定
    window.onload = () => {
        const now = new Date();
        document.getElementById("timeInput").value = 
            `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
        
        if (now.getHours() >= 20 || now.getHours() <= 6) {
            setTheme(true);
        }
    };

    function setTheme(isDark) {
        if (isDark) {
            body.dataset.theme = "dark";
            themeBtn.textContent = "☀️";
        } else {
            delete body.dataset.theme;
            themeBtn.textContent = "🌙";
        }
    }

    themeBtn.onclick = () => setTheme(body.dataset.theme !== "dark");

    function calculate() {
        const mode = document.getElementById("mode").value;
        const timeInput = document.getElementById("timeInput").value;
        const latency = parseInt(document.getElementById("latency").value);
        const resultsContainer = document.getElementById("results");
        
        const [hours, minutes] = timeInput.split(":").map(Number);
        const baseDate = new Date();
        baseDate.setHours(hours, minutes, 0, 0);

        resultsContainer.innerHTML = `<label>${mode === 'bedtime' ? 'おすすめの起床時間' : 'おすすめの就寝時間'}</label>`;

        const cycleMs = 90 * 60 * 1000;
        const latencyMs = latency * 60 * 1000;

        // 3サイクル(4.5h)から7サイクル(10.5h)まで計算
        for (let i = 3; i <= 7; i++) {
            let diff = (cycleMs * i);
            let targetTime;

            if (mode === "bedtime") {
                // 就寝時間モード：基準時間 + 入眠時間 + サイクル
                targetTime = new Date(baseDate.getTime() + latencyMs + diff);
            } else {
                // 起床時間モード：基準時間 - サイクル - 入眠時間
                targetTime = new Date(baseDate.getTime() - diff - latencyMs);
            }

            const tHours = String(targetTime.getHours()).padStart(2, '0');
            const tMins = String(targetTime.getMinutes()).padStart(2, '0');
            const sleepContent = (i * 1.5).toFixed(1);
            
            // 5サイクルと6サイクルを「推奨(Best)」としてハイライト
            const isBest = (i === 5 || i === 6) ? 'best' : '';
            const bestTag = isBest ? '<span style="font-size:0.7rem; color:var(--accent)">★推奨</span>' : '';

            resultsContainer.innerHTML += `
                <div class="result-card ${isBest}">
                    <div>
                        <div class="time-val">${tHours}:${tMins} ${bestTag}</div>
                        <div class="duration-val">${i}サイクル (${sleepContent}時間睡眠)</div>
                    </div>
                    <div style="font-size: 1.5rem">${i >= 5 ? '😴' : '🏃'}</div>
                </div>
            `;
        }
    }
</script>
</body>
</html>
